<title>WestlakeV3 - 42 Deliverables Plan</title>
<style>
:root {
  --bg: #ffffff;
  --sidebar-bg: #f8f9fa;
  --card-bg: #ffffff;
  --border: #e0e0e0;
  --text: #1a1a1a;
  --text-secondary: #555;
  --text-muted: #888;
  --accent: #2563eb;
  --accent-light: #dbeafe;
  --green: #16a34a;
  --green-light: #dcfce7;
  --orange: #ea580c;
  --orange-light: #fff7ed;
  --purple: #7c3aed;
  --purple-light: #ede9fe;
  --red: #dc2626;
  --red-light: #fef2f2;
  --cyan: #0891b2;
  --cyan-light: #ecfeff;
  --tag-phase0: #6366f1;
  --tag-demo1: #2563eb;
  --tag-demo2: #16a34a;
  --tag-demo3: #ea580c;
  --tag-device: #7c3aed;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

/* Sidebar */
#sidebar { width: 320px; min-width: 320px; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
#sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); }
#sidebar-header h1 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
#sidebar-header p { font-size: 12px; color: var(--text-muted); }
#sidebar-nav { flex: 1; overflow-y: auto; padding: 8px; }

.phase-group { margin-bottom: 8px; }
.phase-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 8px 4px; color: var(--text-muted); }
.phase-label.p0 { color: var(--tag-phase0); }
.phase-label.d1 { color: var(--tag-demo1); }
.phase-label.d2 { color: var(--tag-demo2); }
.phase-label.d3 { color: var(--tag-demo3); }
.phase-label.dv { color: var(--tag-device); }

.nav-item { padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; line-height: 1.4; transition: background 0.15s; display: flex; align-items: baseline; gap: 8px; }
.nav-item:hover { background: #e8e8e8; }
.nav-item.active { background: var(--accent-light); color: var(--accent); font-weight: 600; }
.nav-item .num { font-weight: 700; min-width: 24px; font-size: 12px; color: var(--text-muted); }
.nav-item.active .num { color: var(--accent); }
.nav-item .title { flex: 1; }
.nav-item .steps-badge { font-size: 10px; background: #e5e7eb; color: var(--text-muted); padding: 1px 6px; border-radius: 10px; white-space: nowrap; }
.nav-item.active .steps-badge { background: var(--accent); color: white; }
.nav-item.overview-btn { font-weight: 700; background: #f0f0f0; margin-bottom: 8px; justify-content: center; }
.nav-item.overview-btn.active { background: var(--accent); color: white; }

/* Main Panel */
#main { flex: 1; overflow-y: auto; padding: 32px 40px; }

/* Overview */
#overview { display: none; }
#overview.visible { display: block; }
#overview h2 { font-size: 24px; margin-bottom: 24px; }

.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
.stat-card { background: var(--sidebar-bg); border: 1px solid var(--border); border-radius: 8px; padding: 16px; text-align: center; }
.stat-card .val { font-size: 28px; font-weight: 800; color: var(--accent); }
.stat-card .label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

.gantt-container { margin-bottom: 32px; }
.gantt-container h3 { font-size: 16px; margin-bottom: 12px; }
.gantt { width: 100%; border-collapse: collapse; font-size: 12px; }
.gantt th, .gantt td { padding: 6px 8px; border: 1px solid var(--border); text-align: left; }
.gantt th { background: var(--sidebar-bg); font-weight: 600; }
.gantt .bar { height: 18px; border-radius: 4px; display: inline-block; }
.gantt .bar.p0 { background: var(--tag-phase0); }
.gantt .bar.d1 { background: var(--tag-demo1); }
.gantt .bar.d2 { background: var(--tag-demo2); }
.gantt .bar.d3 { background: var(--tag-demo3); }
.gantt .bar.dv { background: var(--tag-device); }

.comparison-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 32px; }
.comparison-table th, .comparison-table td { padding: 8px 12px; border: 1px solid var(--border); }
.comparison-table th { background: var(--sidebar-bg); font-weight: 600; }
.comparison-table td:first-child { font-weight: 600; }

.deliverable-summary { width: 100%; border-collapse: collapse; font-size: 12px; }
.deliverable-summary th, .deliverable-summary td { padding: 6px 10px; border: 1px solid var(--border); }
.deliverable-summary th { background: var(--sidebar-bg); font-weight: 600; position: sticky; top: 0; }
.deliverable-summary tr:hover { background: #f5f5f5; }
.deliverable-summary .clickable { cursor: pointer; color: var(--accent); text-decoration: underline; }

/* Deliverable Card */
.card { display: none; }
.card.visible { display: block; }

.card-header { margin-bottom: 24px; }
.card-header .card-num { font-size: 48px; font-weight: 900; color: var(--accent); line-height: 1; }
.card-header .card-title { font-size: 24px; font-weight: 700; margin-top: 4px; }
.card-tags { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.tag { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 12px; }
.tag.phase { background: #eef2ff; color: var(--tag-phase0); }
.tag.demo1 { background: var(--accent-light); color: var(--tag-demo1); }
.tag.demo2 { background: var(--green-light); color: var(--tag-demo2); }
.tag.demo3 { background: var(--orange-light); color: var(--tag-demo3); }
.tag.device { background: var(--purple-light); color: var(--tag-device); }
.tag.day { background: #fef3c7; color: #92400e; }
.tag.machine { background: var(--cyan-light); color: var(--cyan); }
.tag.duration { background: #f3f4f6; color: var(--text-secondary); }

.section { margin-bottom: 20px; }
.section-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 8px; padding-bottom: 4px; border-bottom: 2px solid var(--border); }
.section-body { font-size: 14px; line-height: 1.7; }
.section-body ul { padding-left: 20px; }
.section-body li { margin-bottom: 4px; }
.section-body code { background: #f1f5f9; padding: 1px 5px; border-radius: 3px; font-size: 13px; font-family: 'Cascadia Code', 'Fira Code', monospace; }

.cmd-block { background: #1e293b; color: #e2e8f0; border-radius: 8px; padding: 14px 16px; margin: 8px 0; font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 12px; line-height: 1.6; position: relative; white-space: pre-wrap; word-break: break-all; }
.cmd-block .copy-btn { position: absolute; top: 8px; right: 8px; background: #475569; color: #e2e8f0; border: none; border-radius: 4px; padding: 4px 10px; font-size: 11px; cursor: pointer; transition: background 0.15s; }
.cmd-block .copy-btn:hover { background: #64748b; }
.cmd-block .copy-btn.copied { background: var(--green); }

.ref-list { list-style: none; padding: 0; }
.ref-list li { padding: 6px 0; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
.ref-list li:last-child { border-bottom: none; }
.ref-list .ref-path { font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 11px; color: var(--accent); background: var(--accent-light); padding: 2px 6px; border-radius: 3px; display: inline-block; margin-top: 2px; word-break: break-all; }
.ref-list .ref-label { font-weight: 600; }

.parallel-box { background: var(--cyan-light); border: 1px solid #a5f3fc; border-radius: 8px; padding: 12px 16px; font-size: 13px; }
.parallel-box strong { color: var(--cyan); }

.original-steps { background: #f8f9fa; border-radius: 6px; padding: 8px 12px; font-size: 12px; color: var(--text-muted); }

/* Keyboard hint */
#kbd-hint { position: fixed; bottom: 16px; right: 16px; background: rgba(0,0,0,0.75); color: white; padding: 8px 14px; border-radius: 8px; font-size: 11px; z-index: 100; }
#kbd-hint kbd { background: rgba(255,255,255,0.2); padding: 2px 6px; border-radius: 3px; margin: 0 2px; }

/* Responsive */
@media (max-width: 900px) {
  #sidebar { width: 260px; min-width: 260px; }
  #main { padding: 20px; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>

const sidebar = document.getElementById('sidebar-nav');
const mainPanel = document.getElementById('main');
const overviewEl = document.getElementById('overview');
const cardContainer = document.getElementById('card-container');
let currentIdx = -1; // -1 = overview

// Build sidebar nav items
const phaseGroups = {
  'Phase 0': {cls:'p0', items:[]},
  'Demo 1': {cls:'d1', items:[]},
  'Demo 2': {cls:'d2', items:[]},
  'Demo 3': {cls:'d3', items:[]},
  'Device': {cls:'dv', items:[]}
};
deliverables.forEach(d => { phaseGroups[d.phase].items.push(d); });

// Clear phase groups in sidebar and rebuild
const groups = sidebar.querySelectorAll('.phase-group');
groups.forEach((g,i) => {
  const phases = Object.keys(phaseGroups);
  const key = phases[i];
  const pg = phaseGroups[key];
  pg.items.forEach(d => {
    const div = document.createElement('div');
    div.className = 'nav-item';
    div.dataset.id = d.id;
    div.innerHTML = '<span class="num">' + d.num + '</span><span class="title">' + d.title + '</span><span class="steps-badge">' + d.steps + '</span>';
    div.onclick = () => showCard(d.id);
    g.appendChild(div);
  });
});

// Build overview
overviewEl.innerHTML = buildOverview();

// Build cards
deliverables.forEach(d => {
  const div = document.createElement('div');
  div.className = 'card';
  div.id = 'card-' + d.id;
  div.innerHTML = buildCard(d);
  cardContainer.appendChild(div);
});

function buildOverview() {
  const totalSteps = 320;
  const totalHours = 126;
  const totalAPIs = 45;

  let ganttRows = [
    {label:'D1: Phase 0', cls:'p0', start:0, end:18, steps:'1-30'},
    {label:'D2: Demo 1 (front)', cls:'d1', start:18, end:36, steps:'31-75'},
    {label:'D3: Demo 1 (back)', cls:'d1', start:36, end:54, steps:'76-130'},
    {label:'D4: Demo 2', cls:'d2', start:54, end:72, steps:'131-220'},
    {label:'D5: Demo 3 (front)', cls:'d3', start:72, end:90, steps:'221-260'},
    {label:'D6: Demo 3 (back)', cls:'d3', start:90, end:108, steps:'261-300'},
    {label:'D7: Device Verify', cls:'dv', start:108, end:126, steps:'301-320'},
  ];

  let ganttHtml = ganttRows.map(r => {
    const pct = ((r.end - r.start) / totalHours * 100);
    const left = (r.start / totalHours * 100);
    return '<tr><td style="width:160px">' + r.label + '</td><td style="width:80px;text-align:center">' + r.steps + '</td><td style="position:relative;height:28px"><div class="bar ' + r.cls + '" style="position:absolute;left:' + left + '%;width:' + pct + '%;top:5px"></div></td></tr>';
  }).join('');

  let summaryRows = deliverables.map(d => {
    return '<tr>' +
      '<td class="clickable" onclick="showCard(' + d.id + ')">' + d.num + '</td>' +
      '<td class="clickable" onclick="showCard(' + d.id + ')">' + d.title + '</td>' +
      '<td>' + d.phase + '</td>' +
      '<td>' + d.day + '</td>' +
      '<td>' + d.steps + '</td>' +
      '<td>' + d.duration + '</td>' +
      '<td>' + d.machines.join(', ') + '</td>' +
    '</tr>';
  }).join('');

  return '<h2>WestlakeV3 Deliverables Overview</h2>' +
    '<p style="color:var(--text-secondary);margin-bottom:24px">AI-autonomous adapter engine: run unmodified Android APKs on HarmonyOS. 1 person + N AI Agents, 7 days.</p>' +

    '<div class="stats-grid">' +
      '<div class="stat-card"><div class="val">42</div><div class="label">Deliverables</div></div>' +
      '<div class="stat-card"><div class="val">320</div><div class="label">Original Steps</div></div>' +
      '<div class="stat-card"><div class="val">7</div><div class="label">Days (126h)</div></div>' +
      '<div class="stat-card"><div class="val">45</div><div class="label">APIs (25% of 179)</div></div>' +
    '</div>' +

    '<div class="gantt-container">' +
      '<h3>Gantt Timeline (7 Days x 18h)</h3>' +
      '<table class="gantt">' +
        '<thead><tr><th>Day / Phase</th><th>Steps</th><th>Timeline (0-126h)</th></tr></thead>' +
        '<tbody>' + ganttHtml + '</tbody>' +
      '</table>' +
    '</div>' +

    // ---- 编译抵消三板斧 ----

function buildCard(d) {
  const phaseTag = d.phaseClass === 'phase' ? 'phase' : d.phaseClass;

  let cmdHtml = (d.commands || []).map((c, i) => {
    const id = 'cmd-' + d.id + '-' + i;
    return '<div style="margin-bottom:12px">' +
      '<div style="font-size:12px;font-weight:600;margin-bottom:4px;color:var(--text-secondary)">' + escHtml(c.label) + '</div>' +
      '<div class="cmd-block" id="' + id + '">' + escHtml(c.cmd) + '<button class="copy-btn" onclick="copyCmd(\'' + id + '\')">Copy</button></div>' +
    '</div>';
  }).join('');

  let refHtml = (d.refs || []).map(r => {
    return '<li><span class="ref-label">' + escHtml(r.label) + '</span><br><span class="ref-path">' + escHtml(r.path) + '</span></li>';
  }).join('');

  let inputHtml = (d.input || []).map(i => '<li><code>' + escHtml(i) + '</code></li>').join('');
  let outputHtml = (d.output || []).map(o => '<li>' + escHtml(o) + '</li>').join('');
  let verifyHtml = (d.verify || []).map(v => '<li>' + escHtml(v) + '</li>').join('');

  let parallelHtml = d.parallel ? '<div class="parallel-box"><strong>Parallel:</strong> ' + escHtml(d.parallel.text) + '<br><strong>Machines:</strong> ' + d.parallel.machines.join(', ') + '</div>' : '';

  let machTags = d.machines.map(m => '<span class="tag machine">' + m + '</span>').join('');

  return '<div class="card-header">' +
      '<div class="card-num">' + d.num + '</div>' +
      '<div class="card-title">' + escHtml(d.title) + '</div>' +
      '<div class="card-tags">' +
        '<span class="tag ' + phaseTag + '">' + d.phase + '</span>' +
        '<span class="tag day">' + d.day + '</span>' +
        '<span class="tag duration">' + d.duration + '</span>' +
        machTags +
      '</div>' +
    '</div>' +

    '<div class="section">' +
      '<div class="section-title">Input</div>' +
      '<div class="section-body"><ul>' + inputHtml + '</ul></div>' +
    '</div>' +

    '<div class="section">' +
      '<div class="section-title">Output</div>' +
      '<div class="section-body"><ul>' + outputHtml + '</ul></div>' +
    '</div>' +

    '<div class="section">' +
      '<div class="section-title">Verification</div>' +
      '<div class="section-body"><ul>' + verifyHtml + '</ul></div>' +
    '</div>' +

    '<div class="section">' +
      '<div class="section-title">Commands</div>' +
      '<div class="section-body">' + cmdHtml + '</div>' +
    '</div>' +

    (parallelHtml ? '<div class="section"><div class="section-title">Parallel</div>' + parallelHtml + '</div>' : '') +

    '<div class="section">' +
      '<div class="section-title">References</div>' +
      '<div class="section-body"><ul class="ref-list">' + refHtml + '</ul></div>' +
    '</div>' +

    '<div class="section">' +
      '<div class="original-steps">Original steps covered: Step ' + d.steps + ' (from MASTER-PLAN.md 320-step plan)</div>' +
    '</div>';
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function showOverview() {
  currentIdx = -1;
  overviewEl.classList.add('visible');
  document.querySelectorAll('.card').forEach(c => c.classList.remove('visible'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelector('.overview-btn').classList.add('active');
  mainPanel.scrollTop = 0;
}

function showCard(id) {
  currentIdx = deliverables.findIndex(d => d.id === id);
  overviewEl.classList.remove('visible');
  document.querySelectorAll('.card').forEach(c => c.classList.remove('visible'));
  document.getElementById('card-' + id).classList.add('visible');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const navItem = document.querySelector('.nav-item[data-id="' + id + '"]');
  if (navItem) {
    navItem.classList.add('active');
    navItem.scrollIntoView({block:'nearest'});
  }
  mainPanel.scrollTop = 0;
}

function copyCmd(id) {
  const el = document.getElementById(id);
  const text = el.textContent.replace('Copy','').replace('Copied!','').trim();
  navigator.clipboard.writeText(text).then(() => {
    const btn = el.querySelector('.copy-btn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
  });
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { showOverview(); return; }
  if (e.key === 'ArrowRight') {
    e.preventDefault();
    if (currentIdx < deliverables.length - 1) {
      showCard(deliverables[currentIdx + 1].id);
    }
  }
  if (e.key === 'ArrowLeft') {
    e.preventDefault();
    if (currentIdx > 0) {
      showCard(deliverables[currentIdx - 1].id);
    } else if (currentIdx === 0) {
      showOverview();
    }
  }
});
</script>
