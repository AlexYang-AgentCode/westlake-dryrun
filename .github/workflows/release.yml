name: Release — Auto-publish on tag

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        run: |
          gh release create ${{ github.ref_name }} \
            --title "WestLake Adapter ${{ github.ref_name }}" \
            --generate-notes \
            adapter/apk-to-arkts.py \
            demos/hello-world/oh-adapted.jpeg \
            demos/calculator/oh-adapted.jpeg
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
